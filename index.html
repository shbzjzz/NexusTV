<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NexusTV · Live Streaming</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.compiled.js"></script>
<style>
:root {
  --bg-deep: #040b14;
  --bg-mid: #071220;
  --glass-bg: rgba(255, 255, 255, 0.03);
  --glass-bg-hover: rgba(255, 255, 255, 0.07);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-border-hover: rgba(255, 255, 255, 0.18);
  --glass-blur: 24px;
  --glass-saturate: 1.6;
  --accent: #a78bfa;
  --accent-dim: rgba(167, 139, 250, 0.15);
  --accent-glow: rgba(167, 139, 250, 0.3);
  --accent-bright: #c4b5fd;
  --red: #f87171;
  --green: #34d399;
  --text-primary: #f1f5f9;
  --text-secondary: rgba(241, 245, 249, 0.55);
  --text-faint: rgba(241, 245, 249, 0.25);
  --font-heading: 'Rajdhani', sans-serif;
  --font-body: 'Inter', sans-serif;
  --radius-lg: 18px;
  --radius-md: 12px;
  --radius-sm: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%, rgba(167, 139, 250, 0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(56, 189, 248, 0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(244, 114, 182, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 70% 20%, rgba(52, 211, 153, 0.05) 0%, transparent 50%),
    linear-gradient(180deg, #040b14 0%, #0a1628 50%, #071220 100%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
}

.glass-strong {
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(32px) saturate(1.8);
  -webkit-backdrop-filter: blur(32px) saturate(1.8);
  border: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.2);
}

.glass-subtle {
  background: rgba(255, 255, 255, 0.02);
  backdrop-filter: blur(16px) saturate(1.3);
  -webkit-backdrop-filter: blur(16px) saturate(1.3);
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(167, 139, 250, 0.3); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(167, 139, 250, 0.5); }

@keyframes livePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(0.6); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes floatOrbs {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -20px) scale(1.05); }
  50% { transform: translate(-20px, 30px) scale(0.95); }
  75% { transform: translate(20px, 20px) scale(1.02); }
}

.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); box-shadow: 0 0 8px var(--red);
  animation: livePulse 1.4s ease-in-out infinite;
  flex-shrink: 0;
}

.channel-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-md);
  border: 1px solid transparent; cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative; overflow: hidden;
}
.channel-item::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--accent-dim), transparent 60%);
  opacity: 0; transition: opacity 0.3s; border-radius: inherit;
}
.channel-item:hover {
  background: var(--glass-bg-hover); border-color: var(--glass-border);
  transform: translateX(4px);
}
.channel-item:hover::before { opacity: 1; }
.channel-item.active {
  background: linear-gradient(135deg, rgba(167, 139, 250, 0.12), rgba(167, 139, 250, 0.04));
  border-color: rgba(167, 139, 250, 0.3);
  box-shadow: 0 0 20px rgba(167, 139, 250, 0.08);
}
.channel-item.active::before { opacity: 1; }

.match-card-glass {
  border-radius: var(--radius-md);
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.06);
  padding: 12px; transition: all 0.3s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.match-card-glass:hover {
  border-color: rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.05);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  transform: translateY(-2px);
}

.group-card-glass {
  border-radius: var(--radius-lg);
  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  border: 1px solid rgba(255, 255, 255, 0.08);
  padding: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
  transition: all 0.3s;
}
.group-card-glass:hover {
  border-color: rgba(167, 139, 250, 0.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(167,139,250,0.06), inset 0 1px 0 rgba(255,255,255,0.08);
}

#app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100dvh; overflow: hidden;
  font-family: var(--font-body);
}

#app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; gap: 12px; height: 60px; flex-shrink: 0;
  position: relative; z-index: 50;
}
#app-header::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.3;
}
.header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.header-center { display: flex; gap: 4px; padding: 4px; border-radius: var(--radius-sm); background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); }
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.logo-icon {
  width: 36px; height: 36px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; letter-spacing: 0.05em;
  background: linear-gradient(135deg, var(--accent), var(--accent-bright));
  color: #000; box-shadow: 0 0 20px var(--accent-glow);
  font-family: var(--font-heading);
}
.logo-text { display: flex; flex-direction: column; line-height: 1; }
.logo-title { font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-primary); font-family: var(--font-heading); }
.logo-title span { color: var(--accent); }
.logo-sub { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-faint); margin-top: 1px; }

.nav-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 6px; font-size: 12px;
  font-weight: 600; letter-spacing: 0.06em; cursor: pointer;
  transition: all 0.2s; border: 1px solid transparent;
  background: transparent; color: var(--text-secondary);
  font-family: var(--font-heading);
}
.nav-tab.active {
  background: linear-gradient(135deg, var(--accent-dim), rgba(167,139,250,0.06));
  color: var(--accent); border-color: rgba(167,139,250,0.3);
  box-shadow: 0 0 12px rgba(167,139,250,0.1);
}
.nav-tab i { font-size: 11px; }

.mobile-menu-btn {
  display: none; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
  cursor: pointer; transition: all 0.2s; color: var(--text-secondary); font-size: 14px;
}
.mobile-menu-btn:hover { background: rgba(255,255,255,0.1); }

.live-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--red); font-family: var(--font-heading); }

#app-body { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 10; }

#sidebar {
  width: 300px; flex-shrink: 0; display: flex; flex-direction: column;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
}
#sidebar-header { padding: 14px 14px 10px; border-bottom: 1px solid var(--glass-border); flex-shrink: 0; }
.sidebar-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sidebar-title { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; letter-spacing: 0.12em; font-family: var(--font-heading); color: var(--text-secondary); }
.sidebar-title i { color: var(--accent); }
.channel-count { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 999px; font-family: var(--font-heading); color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(167,139,250,0.2); }

.search-box {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: var(--radius-sm); margin-bottom: 10px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
  transition: border-color 0.2s;
}
.search-box:focus-within { border-color: rgba(167,139,250,0.3); }
.search-box i { font-size: 11px; color: var(--text-faint); }
.search-box input {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 12px; color: var(--text-primary); font-family: var(--font-body);
}
.search-box input::placeholder { color: var(--text-faint); }

.cat-chips { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.cat-chips::-webkit-scrollbar { display: none; }
.cat-chip {
  white-space: nowrap; padding: 4px 10px; border-radius: 999px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  cursor: pointer; transition: all 0.2s;
  font-family: var(--font-heading); background: transparent;
  border: 1px solid var(--glass-border); color: var(--text-secondary);
}
.cat-chip.active {
  background: linear-gradient(135deg, var(--accent-dim), rgba(167,139,250,0.06));
  border-color: rgba(167,139,250,0.4); color: var(--accent);
}

#channel-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; }

.ch-logo-box {
  width: 34px; height: 34px; flex-shrink: 0; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
}
.ch-logo-box img { width: 100%; height: 100%; object-fit: contain; padding: 2px; }
.ch-logo-box i { font-size: 14px; color: var(--accent); }
.ch-info { flex: 1; min-width: 0; }
.ch-name { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); }
.ch-name.active-name { color: var(--accent); }
.ch-cat { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); font-family: var(--font-heading); margin-top: 1px; }
.ch-num { font-size: 10px; font-weight: 600; color: var(--text-faint); font-family: var(--font-heading); flex-shrink: 0; }
.ch-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: rgba(255,255,255,0.1); }
.ch-dot.active-dot { background: #f87171; box-shadow: 0 0 6px var(--red); animation: livePulse 1.4s ease-in-out infinite; }

.dash-badge {
  display: inline-block; margin-left: 4px; padding: 1px 6px; border-radius: 999px;
  font-size: 8px; font-weight: 600; background: rgba(56,189,248,0.15);
  color: #38bdf8; border: 1px solid rgba(56,189,248,0.25); vertical-align: middle;
}
.drm-badge {
  display: inline-block; margin-left: 4px; padding: 1px 6px; border-radius: 999px;
  font-size: 8px; font-weight: 600; background: rgba(251,191,36,0.15);
  color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); vertical-align: middle;
}

.no-channels { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; gap: 8px; }
.no-channels i { font-size: 18px; color: var(--text-faint); }
.no-channels p { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-heading); color: var(--text-faint); }

#sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }

#main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

#tv-view { display: flex; flex: 1; flex-direction: column; overflow: hidden; }
#tv-view-inner { display: flex; flex: 1; overflow: hidden; }

.player-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; padding: 12px; gap: 10px; }

.player-frame {
  flex: 1; position: relative; border-radius: var(--radius-lg); overflow: hidden;
  background: #000; min-height: 0;
  box-shadow: 0 0 0 1px var(--glass-border), 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(167,139,250,0.06);
}
.player-frame:-webkit-full-screen { width: 100vw; height: 100vh; border-radius: 0; }
.player-frame:-moz-full-screen    { width: 100vw; height: 100vh; border-radius: 0; }
.player-frame:fullscreen          { width: 100vw; height: 100vh; border-radius: 0; }

.player-inner-glow {
  position: absolute; inset: 0; border-radius: var(--radius-lg); pointer-events: none; z-index: 5;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
}
#player-container { position: absolute; inset: 0; z-index: 1; }
#tv-video {
  position: absolute; inset: 0; width: 100%; height: 100%; border: none;
  border-radius: var(--radius-lg); object-fit: contain;
}
#tv-iframe {
  position: absolute; inset: 0; width: 100%; height: 100%; border: none;
  border-radius: var(--radius-lg); display: none;
}

#player-overlay {
  position: absolute; inset: 0; z-index: 20; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  border-radius: var(--radius-lg); transition: opacity 0.5s;
  background: rgba(4,11,20,0.9); backdrop-filter: blur(8px);
}
#player-overlay.hidden { opacity: 0; pointer-events: none; }
.overlay-spinner {
  width: 40px; height: 40px; border-radius: 50%;
  border: 2px solid rgba(167,139,250,0.2);
  border-top-color: var(--accent);
  animation: spin 0.9s linear infinite;
}
.overlay-msg { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-align: center; font-family: var(--font-heading); color: var(--accent); }
.overlay-proxy { font-size: 10px; letter-spacing: 0.08em; font-family: var(--font-heading); color: var(--text-faint); }

#hover-controls {
  position: absolute; bottom: 12px; left: 12px; right: 12px; z-index: 30;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  border-radius: var(--radius-md); padding: 10px 14px;
  background: rgba(4,11,20,0.75); backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  transition: all 0.3s; opacity: 0; transform: translateY(8px);
}
#hover-controls.visible { opacity: 1; transform: translateY(0); }
.ctrl-group { display: flex; align-items: center; gap: 8px; }
.ctrl-btn {
  width: 32px; height: 32px; border-radius: 8px; display: flex;
  align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.2s; background: rgba(255,255,255,0.07);
  border: 1px solid var(--glass-border); color: var(--text-primary); font-size: 12px;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.12); }
.ctrl-btn i.muted-icon { color: var(--red); }
.vol-slider {
  width: 80px; height: 3px; border-radius: 999px; appearance: none;
  cursor: pointer; background: rgba(255,255,255,0.12); accent-color: var(--accent);
}
.vol-slider::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }

.info-bar { flex-shrink: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.info-card {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-radius: var(--radius-md); flex: 1; min-width: 180px;
}
.info-logo {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  background: rgba(255,255,255,0.05);
}
.info-logo img { width: 100%; height: 100%; object-fit: contain; }
.info-logo i { font-size: 14px; color: var(--accent); }
.info-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); font-family: var(--font-heading); }
.info-name { font-size: 13px; font-weight: 600; color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#scoreboard {
  width: 320px; flex-shrink: 0; display: flex; flex-direction: column;
}
#scoreboard-header {
  padding: 14px 14px 10px; border-bottom: 1px solid var(--glass-border); flex-shrink: 0;
}
.sb-title { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; letter-spacing: 0.12em; font-family: var(--font-heading); color: var(--accent); }
.sb-title i { font-size: 12px; }
#scoreboard-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }

.match-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--glass-border); }
.match-comp { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-heading); color: var(--text-faint); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.match-status {
  font-size: 9px; font-weight: 700; letter-spacing: 0.08em; padding: 2px 6px; border-radius: 999px;
  font-family: var(--font-heading); white-space: nowrap;
}
.match-status.live { color: var(--red); background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); animation: livePulse 1.4s ease-in-out infinite; }
.match-status.done { color: var(--green); background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.2); }
.match-status.sched { color: var(--text-faint); background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); }

.match-body { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.team-col { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 38%; }
.team-logo { width: 28px; height: 28px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); }
.team-name { font-size: 10px; font-weight: 600; text-align: center; line-height: 1.2; color: var(--text-primary); }
.score-box {
  font-size: 20px; font-weight: 700; padding: 4px 12px; border-radius: 8px;
  text-align: center; min-width: 60px; font-family: var(--font-heading);
  color: var(--accent); background: var(--accent-dim);
  border: 1px solid rgba(167,139,250,0.2); letter-spacing: 0.05em;
}

.no-data { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; gap: 8px; }
.no-data i { font-size: 18px; color: var(--text-faint); }
.no-data p { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-heading); color: var(--text-faint); }

#standings-view { display: none; flex: 1; overflow-y: auto; padding: 14px; }
#standings-view.active { display: block; }
.standings-inner { max-width: 1200px; margin: 0 auto; }

  },
  {

];

/* ══════════════════════════════════════════
   STATE
   ══════════════════════════════════════════ */
let activeId = null;
let selectedCat = 'All';
let searchQ = '';
let sidebarOpen = false;
let currentView = 'tv';
let liveEvents = [];
let standings = [];
let proxyOn = false;
let isMuted = false;
let volume = 0.8;
let showControls = false;
let isMobile = false;
let hlsInstance = null;
let shakaInstance = null;

/* ══════════════════════════════════════════
   DOM REFS
   ══════════════════════════════════════════ */
const $video = document.getElementById('tv-video');
const $iframe = document.getElementById('tv-iframe');
const $playerContainer = document.getElementById('player-container');
const $playerOverlay = document.getElementById('player-overlay');
const $overlayMsg = document.getElementById('overlay-msg');
const $overlayProxy = document.getElementById('overlay-proxy');
const $hoverControls = document.getElementById('hover-controls');
const $muteBtn = document.getElementById('mute-btn');
const $volSlider = document.getElementById('vol-slider');
const $fsBtn = document.getElementById('fs-btn');
const $playerFrame = document.getElementById('player-frame');
const $infoLogo = document.getElementById('info-logo');
const $infoName = document.getElementById('info-name');
const $sidebar = document.getElementById('sidebar');
const $sidebarOverlay = document.getElementById('sidebar-overlay');
const $menuBtn = document.getElementById('menu-btn');
const $searchInput = document.getElementById('search-input');
const $catChips = document.getElementById('cat-chips');
const $channelList = document.getElementById('channel-list');
const $chCount = document.getElementById('ch-count');
const $scoreboardList = document.getElementById('scoreboard-list');
const $standingsGrid = document.getElementById('standings-grid');
const $tvView = document.getElementById('tv-view');
const $standingsView = document.getElementById('standings-view');
const $mobileNav = document.getElementById('mobile-nav');

/* ══════════════════════════════════════════
   CATEGORIES
   ══════════════════════════════════════════ */
const categories = ['All', ...new Set(CHANNELS.map(c => c.category))];

function renderCatChips() {
  $catChips.innerHTML = categories.map(cat =>
    `<button class="cat-chip ${cat === selectedCat ? 'active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');
}

/* ══════════════════════════════════════════
   FILTERED CHANNELS
   ══════════════════════════════════════════ */
function getFiltered() {
  return CHANNELS.filter(c => {
    const catOk = selectedCat === 'All' || c.category === selectedCat;
    const searchOk = c.name.toLowerCase().includes(searchQ.toLowerCase()) || c.category.toLowerCase().includes(searchQ.toLowerCase());
    return catOk && searchOk;
  });
}

/* ══════════════════════════════════════════
   RENDER CHANNEL LIST
   ══════════════════════════════════════════ */
function renderChannels() {
  const filtered = getFiltered();
  $chCount.textContent = filtered.length;

  if (filtered.length === 0) {
    $channelList.innerHTML = `<div class="no-channels"><i class="fa-solid fa-search"></i><p>No channels found</p></div>`;
    return;
  }

  $channelList.innerHTML = filtered.map(ch => {
    const isActive = ch.id === activeId;
    const badges = [
      ch.isDash ? '<span class="dash-badge">DASH</span>' : '',
      ch.isDrm  ? '<span class="drm-badge">DRM</span>'  : ''
    ].join('');
    return `
      <div class="channel-item ${isActive ? 'active' : ''}" data-id="${ch.id}">
        <div class="ch-logo-box">
          ${ch.logo ? `<img src="${ch.logo}" alt="${ch.name}" onerror="this.style.display='none'">` : `<i class="fa-solid fa-tv"></i>`}
        </div>
        <div class="ch-info">
          <div class="ch-name ${isActive ? 'active-name' : ''}">${ch.name}${badges}</div>
          <div class="ch-cat">${ch.category}</div>
        </div>
        <span class="ch-num">${ch.number}</span>
        <div class="ch-dot ${isActive ? 'active-dot' : ''}"></div>
      </div>
    `;
  }).join('');
}

/* ══════════════════════════════════════════
   OVERLAY HELPERS
   ══════════════════════════════════════════ */
function showOverlay(msg) {
  $overlayMsg.textContent = msg;
  $overlayProxy.textContent = 'PROXY: ' + (proxyOn ? 'ON' : 'OFF');
  $playerOverlay.classList.remove('hidden');
}
function hideOverlay() {
  $playerOverlay.classList.add('hidden');
}

/* ══════════════════════════════════════════
   DESTROY ALL PLAYERS — full teardown before
   every channel switch so old stream stops
   ══════════════════════════════════════════ */
function destroyPlayers() {
  // 1. HLS.js
  if (hlsInstance) {
    hlsInstance.stopLoad();
    hlsInstance.detachMedia();
    hlsInstance.destroy();
    hlsInstance = null;
  }

  // 2. Shaka
  if (shakaInstance) {
    try {
      shakaInstance.unload();
      shakaInstance.destroy();
    } catch(e) {}
    shakaInstance = null;
  }

  // 3. Hard-stop the video element
  try {
    $video.pause();
    $video.removeAttribute('src');
    $video.load(); // flush buffered data
  } catch(e) {}

  // 4. Kill iframe
  $iframe.src = 'about:blank';
  $iframe.style.display = 'none';

  // 5. Clear any shaka-injected containers
  $playerContainer.innerHTML = '';

  // 6. Re-ensure video is inside player-frame
  if (!$playerFrame.contains($video)) {
    $playerFrame.insertBefore($video, $playerOverlay);
  }
}

/* ══════════════════════════════════════════
   PLAY CHANNEL
   ══════════════════════════════════════════ */
function playChannel(id, useProxy) {
  if (useProxy === undefined) useProxy = false;
  const ch = CHANNELS.find(c => c.id === id);
  if (!ch) return;

  // ── Stop old stream first ──
  destroyPlayers();

  activeId = id;
  proxyOn = useProxy;
  showOverlay(useProxy ? 'ROUTING VIA PROXY...' : 'TUNING: ' + ch.name.toUpperCase());
  renderChannels();

  // ── EMBED MODE ──
  if (ch.isEmbed) {
    $video.style.display = 'none';
    $iframe.style.display = 'block';
    $iframe.src = ch.url;
    $iframe.onload = () => hideOverlay();
    setTimeout(hideOverlay, 3000);
    updateInfoBar(ch);
    return;
  }

  $video.style.display = 'block';
  $video.volume = volume;

  // ── DASH + ClearKey DRM (Shaka) ──
  if (ch.isDash) {
    initDashPlayer(ch, useProxy);
    updateInfoBar(ch);
    return;
  }

  // ── HLS MODE ──
  let streamUrl = ch.url;
  // noProxy channels skip the CORS proxy fallback (tokenised URLs break when proxied)
  const canProxy = !ch.noProxy;

  if (useProxy && canProxy) {
    streamUrl = 'https://corsproxy.io/?' + encodeURIComponent(streamUrl);
  }

  if (window.Hls && window.Hls.isSupported()) {
    const hls = new window.Hls({
      enableWorker: true,
      lowLatencyMode: true,
      xhrSetup: (xhr) => {
        // No custom headers needed for these open streams
      }
    });
    hlsInstance = hls;
    hls.loadSource(streamUrl);
    hls.attachMedia($video);
    hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
      $video.play().catch(() => {});
      hideOverlay();
    });
    hls.on(window.Hls.Events.ERROR, (evt, data) => {
      if (data.fatal) {
        if (data.type === window.Hls.ErrorTypes.NETWORK_ERROR && !useProxy && canProxy) {
          showOverlay('CORS BLOCK - REROUTING...');
          setTimeout(() => playChannel(id, true), 1200);
        } else if (data.type === window.Hls.ErrorTypes.MEDIA_ERROR) {
          hls.recoverMediaError();
        } else {
          showOverlay('STREAM UNREACHABLE');
        }
      }
    });
  } else if ($video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari native HLS
    $video.src = streamUrl;
    $video.onloadedmetadata = () => { $video.play(); hideOverlay(); };
    $video.onerror = () => showOverlay('STREAM UNREACHABLE');
  }

  updateInfoBar(ch);
}

/* ══════════════════════════════════════════
   DASH / ClearKey DRM — SHAKA v5
   Uses config extracted from HAR player.
   ACAO: * so no proxy needed for otte CDN.
   ══════════════════════════════════════════ */
async function initDashPlayer(ch, useProxy) {
  const Shaka = window.shaka;
  if (!Shaka || !Shaka.Player) {
    showOverlay('SHAKA NOT LOADED');
    return;
  }

  $video.style.display = 'block';

  let player;
  try {
    player = new Shaka.Player();
    await player.attach($video);
  } catch(e) {
    try { player = new Shaka.Player($video); } catch(e2) {
      showOverlay('DASH INIT FAILED');
      console.error(e2);
      return;
    }
  }
  shakaInstance = player;

  // Build DRM config
  const drmConfig = ch.clearKeys ? { clearKeys: ch.clearKeys } : undefined;

  player.configure({
    drm: drmConfig || {},
    manifest: {
      defaultPresentationDelay: 4,
      ignoreTextStreamFailures: true,
      dash: { autoCorrectDrift: true, ignoreMinBufferTime: true }
    },
    abr: {
      enabled: true,
      defaultBandwidthEstimate: 2000000,
      restrictions: { maxHeight: 1080 }
    }
  });

  // Low-latency tuning (Shaka v5 API)
  try {
    player.configurationForLowLatency({
      streaming: {
        inaccurateManifestTolerance: 0,
        segmentPrefetchLimit: 2,
        updateIntervalSeconds: 0.1,
        bufferingGoal: 10,
        rebufferingGoal: 2,
        bufferBehind: 30,
        retryParameters: { baseDelay: 100, maxAttempts: 5, backoffFactor: 1.5, fuzzFactor: 0.5 }
      }
    });
  } catch(e) { /* older bundle — skip */ }

  let mpdUrl = ch.url;
  if (mpdUrl.endsWith('/')) mpdUrl += 'index.mpd';

  // otte CDN has ACAO: * — direct load works, no proxy needed
  if (useProxy && !ch.noProxy) {
    mpdUrl = 'https://corsproxy.io/?' + encodeURIComponent(mpdUrl);
  }

  try {
    await player.load(mpdUrl);
    $video.volume = volume;
    $video.play().catch(() => {});
    hideOverlay();
  } catch(err) {
    const httpStatus = err && err.data && err.data[1];
    const isAuthError = httpStatus === 401 || httpStatus === 403;

    if (isAuthError) {
      showOverlay('STREAM REQUIRES AUTH (401/403)');
      return;
    }

    if (!useProxy) {
      showOverlay('DASH CORS - REROUTING...');
      setTimeout(() => playChannel(ch.id, true), 1500);
    } else {
      showOverlay('DASH STREAM UNREACHABLE');
      console.error('Shaka load error:', err);
    }
  }
}

/* ══════════════════════════════════════════
   INFO BAR
   ══════════════════════════════════════════ */
function updateInfoBar(ch) {
  if (ch && ch.logo) {
    $infoLogo.innerHTML = `<img src="${ch.logo}" alt="${ch.name}" onerror="this.style.display='none';this.parentNode.innerHTML='<i class=\\'fa-solid fa-satellite-dish\\'></i>'">`;
  } else {
    $infoLogo.innerHTML = '<i class="fa-solid fa-satellite-dish"></i>';
  }
  $infoName.textContent = ch ? ch.name : '—';
}

/* ══════════════════════════════════════════
   AUDIO CONTROLS
   ══════════════════════════════════════════ */
$muteBtn.addEventListener('click', () => {
  $video.muted = !$video.muted;
  isMuted = $video.muted;
  $muteBtn.innerHTML = `<i class="fa-solid ${isMuted ? 'fa-volume-xmark muted-icon' : 'fa-volume-high'}"></i>`;
});

$volSlider.addEventListener('input', (e) => {
  const v = parseFloat(e.target.value);
  $video.volume = v;
  volume = v;
  if (v > 0 && $video.muted) {
    $video.muted = false;
    isMuted = false;
    $muteBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
  }
});

/* ══════════════════════════════════════════
   FULLSCREEN — targets player-frame div
   ══════════════════════════════════════════ */
$fsBtn.addEventListener('click', () => {
  const el = $playerFrame;
  if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement) {
    if (el.requestFullscreen)            el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
    $fsBtn.innerHTML = '<i class="fa-solid fa-compress"></i>';
  } else {
    if (document.exitFullscreen)            document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    else if (document.mozCancelFullScreen)  document.mozCancelFullScreen();
    $fsBtn.innerHTML = '<i class="fa-solid fa-expand"></i>';
  }
});

function syncFsIcon() {
  const inFS = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
  $fsBtn.innerHTML = `<i class="fa-solid ${inFS ? 'fa-compress' : 'fa-expand'}"></i>`;
}
document.addEventListener('fullscreenchange', syncFsIcon);
document.addEventListener('webkitfullscreenchange', syncFsIcon);
document.addEventListener('mozfullscreenchange', syncFsIcon);

// Hover controls
$playerFrame.addEventListener('mouseenter', () => { $hoverControls.classList.add('visible'); });
$playerFrame.addEventListener('mouseleave', () => { $hoverControls.classList.remove('visible'); });
$playerFrame.addEventListener('touchstart', (e) => {
  if (e.target.closest('#hover-controls')) return;
  showControls = !showControls;
  $hoverControls.classList.toggle('visible', showControls);
}, { passive: true });

/* ══════════════════════════════════════════
   ESPN SCOREBOARD
   ══════════════════════════════════════════ */
async function fetchScoreboard() {
  try {
    const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard');
    if (!res.ok) return;
    const data = await res.json();
    liveEvents = data.events || [];
    renderScoreboard();
  } catch(e) {}
}

async function fetchStandings() {
  try {
    const res = await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings');
    if (!res.ok) return;
    const data = await res.json();
    standings = data.children || [];
    renderStandings();
  } catch(e) {}
}

function renderScoreboard() {
  if (liveEvents.length === 0) {
    $scoreboardList.innerHTML = `<div class="no-data"><i class="fa-solid fa-futbol"></i><p>No live data</p></div>`;
    return;
  }
  $scoreboardList.innerHTML = liveEvents.map(ev => {
    const c = ev.competitions[0];
    const t1 = c.competitors[0];
    const t2 = c.competitors[1];
    const state = ev.status.type.state;
    const statusCls = state === 'in' ? 'live' : state === 'post' ? 'done' : 'sched';
    return `
      <div class="match-card-glass">
        <div class="match-header">
          <span class="match-comp">${ev.name}</span>
          <span class="match-status ${statusCls}">${ev.status.type.shortDetail}</span>
        </div>
        <div class="match-body">
          <div class="team-col">
            <img class="team-logo" src="${t1.team.logo || ''}" alt="" onerror="this.style.display='none'">
            <span class="team-name">${t1.team.shortDisplayName}</span>
          </div>
          <div class="score-box">${t1.score}–${t2.score}</div>
          <div class="team-col">
            <img class="team-logo" src="${t2.team.logo || ''}" alt="" onerror="this.style.display='none'">
            <span class="team-name">${t2.team.shortDisplayName}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderStandings() {
  if (standings.length === 0) {
    $standingsGrid.innerHTML = `<div class="no-data"><i class="fa-solid fa-circle-notch" style="animation:spin 1s linear infinite"></i><p>Loading standings...</p></div>`;
    return;
  }
  $standingsGrid.innerHTML = standings.map(group => {
    const teams = (group.standings && group.standings.entries) || [];
    return `
      <div class="group-card-glass">
        <h3 class="group-title">${group.name}</h3>
        <table class="group-table">
          <thead><tr><th colspan="2">Team</th><th>W</th><th>D</th><th>L</th><th>Pts</th></tr></thead>
          <tbody>
            ${teams.map((t, ti) => {
              const getStat = (name) => {
                const s = t.stats && t.stats.find(s => s.name === name);
                return s ? s.value : '—';
              };
              const logo = (t.team.logos && t.team.logos[0]) ? t.team.logos[0].href : '';
              return `
                <tr>
                  <td style="padding-right:4px;color:var(--text-secondary)">${ti+1}</td>
                  <td><div class="team-cell">${logo ? `<img src="${logo}" onerror="this.style.display='none'">` : ''}<span>${t.team.displayName}</span></div></td>
                  <td>${getStat('wins')}</td>
                  <td>${getStat('ties')}</td>
                  <td>${getStat('losses')}</td>
                  <td class="pts-cell">${getStat('points')}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }).join('');
}

/* ══════════════════════════════════════════
   VIEW SWITCHING
   ══════════════════════════════════════════ */
function setView(view) {
  currentView = view;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.querySelectorAll('.mobile-nav-btn[data-view]').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  if (view === 'tv') {
    $tvView.style.display = '';
    $standingsView.classList.remove('active');
  } else {
    $tvView.style.display = 'none';
    $standingsView.classList.add('active');
  }
}

/* ══════════════════════════════════════════
   SIDEBAR
   ══════════════════════════════════════════ */
function toggleSidebar(open) {
  sidebarOpen = open;
  $sidebar.classList.toggle('open', open);
  $sidebarOverlay.classList.toggle('show', open);
}

function checkMobile() {
  isMobile = window.innerWidth <= 900;
  $mobileNav.classList.toggle('show', isMobile);
  if (!isMobile) toggleSidebar(false);
}

/* ══════════════════════════════════════════
   EVENT LISTENERS
   ══════════════════════════════════════════ */
document.querySelectorAll('.nav-tab').forEach(tab => tab.addEventListener('click', () => setView(tab.dataset.view)));
document.getElementById('mob-channels').addEventListener('click', () => toggleSidebar(true));
document.querySelectorAll('.mobile-nav-btn[data-view]').forEach(btn => btn.addEventListener('click', () => setView(btn.dataset.view)));
$menuBtn.addEventListener('click', () => toggleSidebar(!sidebarOpen));
$sidebarOverlay.addEventListener('click', () => toggleSidebar(false));
$searchInput.addEventListener('input', (e) => { searchQ = e.target.value; renderChannels(); });

$catChips.addEventListener('click', (e) => {
  const chip = e.target.closest('.cat-chip');
  if (!chip) return;
  selectedCat = chip.dataset.cat;
  renderCatChips();
  renderChannels();
});

$channelList.addEventListener('click', (e) => {
  const item = e.target.closest('.channel-item');
  if (!item) return;
  const id = item.dataset.id;
  if (id === activeId) return; // already playing
  playChannel(id);
  if (isMobile) toggleSidebar(false);
});

window.addEventListener('resize', checkMobile);

/* ══════════════════════════════════════════
   INIT
   ══════════════════════════════════════════ */
checkMobile();
renderCatChips();
renderChannels();
renderScoreboard();
renderStandings();
setView('tv');

fetchScoreboard();
fetchStandings();
setInterval(fetchScoreboard, 30000);

// Auto-play TRT Alt on load
setTimeout(() => playChannel('trt-alt'), 500);
</script>
</body>
</html>
